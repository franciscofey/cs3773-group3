    <script>
        function showSidebar(){
            const sidebar = document.querySelector('.sidebar')
            sidebar.style.display = 'flex'
        }

        function hideSidebar(){
            const sidebar = document.querySelector('.sidebar')
            sidebar.style.display = 'none'
        }

        function toggleSidebarDropdown(event){
            event.preventDefault(); //prevents page jump
            const dropdown = event.target.nextElementSibling;
            dropdown.classList.toggle("active");
        }
    </script>

    <!-- This script calls the load/display function in the merch.js file -->
    <script type="module">
        import { loadAndDisplayMerchandise } from './merch.js';
        import { cartButtonMerchCircle } from '../cart/cartButton.js';

        async function init() {
            // Wait for the merchandise to hit the screen
            await loadAndDisplayMerchandise();

            // Filter items based on the search box
            const searchInput = document.getElementById('search-input');
            if (searchInput) {
                searchInput.addEventListener('input', (e) => {
                    const searchTerm = e.target.value.toLowerCase().trim();
                    const allCards = document.querySelectorAll('.pro');

                    allCards.forEach(card => {
                        const name = card.querySelector('h5')?.innerText.toLowerCase() || "";
                        const description = card.getAttribute('data-description') || "";
                        const associatedGame = card.getAttribute('data-game') || "";

                        // Check if the term matches title, description, or game tags
                        if (name.includes(searchTerm) ||
                            description.includes(searchTerm) ||
                            associatedGame.includes(searchTerm)) {
                            card.style.display = "";
                        } else {
                            card.style.display = "none";
                        }
                    });
                });
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            init();

            // Handle interactions for the entire merchandise grid
            document.addEventListener('click', (event) => {
                const btn = event.target.closest('.cart');
                const card = event.target.closest('.pro');

                // Fire off the merch-specific cart logic
                if (btn) {
                    event.preventDefault();
                    event.stopPropagation();
                    cartButtonMerchCircle(event);
                    return;
                }

                // Head to the detail page if the card is clicked
                if (card) {
                    const merchId = card.getAttribute('data-id');
                    if (merchId) {
                        window.location.href = `../products/merchProduct.html?id=${merchId}`;
                    }
                }
            });

            // Re-display the list whenever sorting is changed
            const sortSelect = document.getElementById('sort-by');
            if (sortSelect) {
                sortSelect.addEventListener('change', loadAndDisplayMerchandise);
            }
        });
    </script>

            color: #60a5fa;
