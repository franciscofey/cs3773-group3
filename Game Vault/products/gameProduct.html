    <script>
        function showSidebar(){
            const sidebar = document.querySelector('.sidebar')
            sidebar.style.display = 'flex'
        }
        function hideSidebar(){
            const sidebar = document.querySelector('.sidebar')
            sidebar.style.display = 'none'
        }

        function toggleSidebarDropdown(event){
            event.preventDefault(); //prevents page jump

            const dropdown = event.target.nextElementSibling;
            dropdown.classList.toggle("active");
        }
    </script>

    <!-- This script calls the load/display function in the gameProduct.js file -->
    <script type="module">
        import { loadAndDisplayProduct } from './gameProduct.js';
        import { cartButtonDigitalGame } from '../cart/cartButton.js';

        document.addEventListener('DOMContentLoaded', () => {
            // Fetch and inject the specific game details
            loadAndDisplayProduct();

            // Listen for the "Add to Cart" click on this page
            document.addEventListener('click', (event) => {
                const btn = event.target.closest('.add-to-cart-btn');
                if (btn) {
                    // Stop form submission or page jumps
                    event.preventDefault();
                    cartButtonDigitalGame(event);
                }
            });
        });
    </script>
    <!-- End of gameProduct.js script (Let me know if you have questions -Lauren) -->

    <!-- Main anchor for the game detail content -->
    <main id="product-container">
        <!-- Continues section/script in gameProduct.js -->
    </main>
    <!-- End of Product section (Let me know if you have questions -Lauren) -->

    <style>
        :root {
            /* Emerald Gaming Palette */
            --bg-body: #1a1f1c;        /* Deep Charcoal Grey with a hint of green*/
            --bg-card: #161e1b;        /* Subtle forest-slate for boxes */
            --primary: #088178;        /* Your original signature green */
            --accent: #10b981;         /* Bright neon green for hover/icons */
            --text-main: #e2e8f0;      /* Crisp off-white */
            --text-muted: #94a3b8;     /* Muted sage-grey */
            --star: #fbbf24;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            font-family: 'Inter', sans-serif;
        }

        /* Main layout for the product detail view */
        .product-page-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            max-width: 1200px;
            margin: 60px auto;
            padding: 20px;
        }

        /* Big hero image with a soft green glow */
        .product-media img {
            width: 100%;
            border-radius: 20px;
            border: 1px solid rgba(8, 129, 120, 0.3);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6), 0 0 20px rgba(8, 129, 120, 0.1);
        }

        /* Tiny header text above the title */
        .breadcrumb {
            font-size: 11px;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .game-title {
            font-size: 3.2rem;
            margin: 0 0 15px 0;
            font-weight: 800;
            color: #fff;
            line-height: 1;
        }

        .rating-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 30px;
        }

        .stars { color: var(--star); }
        .score-label { color: var(--text-muted); font-size: 0.9rem; }

        .price-tag {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 30px;
        }

        /* Dark purchase box that holds quantity and button */
        .purchase-zone {
            background: var(--bg-card);
            border: 1px solid rgba(8, 129, 120, 0.2);
            padding: 30px;
            border-radius: 16px;
            display: flex;
            align-items: flex-end;
            gap: 20px;
            margin-bottom: 40px;
        }

        .qty-wrapper label {
            display: block;
            font-size: 11px;
            color: var(--primary);
            margin-bottom: 8px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .qty-wrapper input {
            background: #060908;
            border: 1px solid #2d3748;
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            width: 60px;
            font-weight: bold;
        }

        /* Large action button with lift effect on hover */
        .add-to-cart-btn {
            flex-grow: 1;
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 8px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .add-to-cart-btn:hover {
            background: var(--accent);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3);
        }

        /* Section for game summary and detailed text */
        .description-box h3 {
            font-size: 1.3rem;
            color: var(--primary);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Horizontal line next to the section title */
        .description-box h3::after {
            content: "";
            height: 1px;
            background: rgba(8, 129, 120, 0.3);
            flex-grow: 1;
        }

        .description-box p {
            line-height: 1.8;
            color: var(--text-muted);
            font-size: 1.05rem;
        }

        /* Small footer tags for the product info */
        .meta-info {
            margin-top: 40px;
            display: flex;
            gap: 30px;
            padding-top: 25px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .meta-info span {
            font-size: 13px;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Stack elements on smaller screens */
        @media (max-width: 900px) {
            .product-page-container { grid-template-columns: 1fr; gap: 40px; }
            .game-title { font-size: 2.2rem; }
        }

        .stock-container {
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9rem;
            margin: 10px 0;
            font-weight: bold;
        }

        /* Amber label to contrast the main green theme */
        .stock-label {
            color: #e0b000 !important;
        }

        /* Bright gold stock count with hard shadow */
        .stock-value {
            color: #ffcc00 !important;
            text-shadow: 2px 2px 0px rgba(0, 0, 0, 0.6) !important;
        }

        .price-tag {
            margin-bottom: 5px;
        }
    </style>
