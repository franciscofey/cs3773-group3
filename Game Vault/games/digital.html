<script>
  function showSidebar(){
    const sidebar = document.querySelector('.sidebar')
    sidebar.style.display = 'flex'
  }

  function hideSidebar(){
    const sidebar = document.querySelector('.sidebar')
    sidebar.style.display = 'none'
  }

  function toggleSidebarDropdown(event){
    event.preventDefault(); //prevents page jump
    const dropdown = event.target.nextElementSibling;
    dropdown.classList.toggle("active");
  }
</script>

<!-- This script calls the load/display function in the game.js file -->
<script type="module">
  import { loadAndDisplayGames } from './game.js';
  import { cartButtonGameCircle } from '../cart/cartButton.js';

  async function init() {
    // Get games on the screen first
    await loadAndDisplayGames();

    const searchInput = document.getElementById('search-input');

    if (searchInput) {
      searchInput.addEventListener('input', (e) => {
        const searchTerm = e.target.value.toLowerCase().trim();
        const allCards = document.querySelectorAll('.pro');

        // Filter cards based on name or summary text
        allCards.forEach(card => {
          const name = card.querySelector('h5')?.innerText.toLowerCase() || "";
          const summary = card.getAttribute('data-summary') || "";

          if (name.includes(searchTerm) || summary.includes(searchTerm)) {
            card.style.display = "";
          } else {
            card.style.display = "none";
          }
        });
      });
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    init();

    // Catch clicks on the grid
    document.addEventListener('click', (event) => {
      const btn = event.target.closest('.cart');
      const card = event.target.closest('.pro');

      // Handle "Add to Cart" icon clicks
      if (btn) {
        event.preventDefault();
        event.stopPropagation();
        cartButtonGameCircle(event);
        return;
      }

      // Send user to detail page if they click the card itself
      if (card) {
        const gameId = card.getAttribute('data-id');
        if (gameId) {
          window.location.href = `../products/gameProduct.html?id=${gameId}`;
        }
      }
    });

    // Refresh the list when the sort dropdown changes
    const sortSelect = document.getElementById('sort-by');
    if (sortSelect) {
      sortSelect.addEventListener('change', loadAndDisplayGames);
    }
  });
</script>

<style>
  /* Hide elements without removing from DOM */
  .hidden-card { display: none !important; }

  /* Cyberpunk color palette */
  :root {
    --neon-blue: #00d2ff;
    --neon-pink: #ff00ff;
    --deep-bg: #0b0e1a;
  }

  body {
    background: radial-gradient(circle at 20% 30%, rgba(0, 210, 255, 0.15) 0%, transparent 40%),
    radial-gradient(circle at 80% 30%, rgba(255, 0, 255, 0.15) 0%, transparent 40%),
    linear-gradient(180deg, #161b33 0%, var(--deep-bg) 100%);
    background-attachment: fixed;
    color: #e2e8f0;
    font-family: 'Courier New', Courier, monospace;
    margin: 0;
  }

  /* Header background and blur effects */
  #digital-page-header {
    background-image: linear-gradient(rgba(11, 14, 26, 0.6)), url("../img/digital-header.png");
    backdrop-filter: blur(10px);
    border-bottom: 2px solid var(--neon-blue);
    box-shadow: -10px 0 30px rgba(0, 210, 255, 0.2), 10px 0 30px rgba(255, 0, 255, 0.2);
    height: 35vh;
    background-position: center 1px;
    width: 100%;
    background-size: cover;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }

  /* Retro-styled dropdown */
  #digital-page-header .single-pro-details select {
    color: #00f0ff !important;
    background: rgba(46, 2, 73, 0.4);
    backdrop-filter: blur(8px);
    border: 2px solid #00f0ff;
    border-radius: 4px;
    padding: 8px 15px;
    font-family: 'Press Start 2P', cursive;
    font-size: 0.8rem;
    box-shadow: 0 0 10px rgba(0, 240, 255, 0.3);
    text-shadow: 0 0 5px rgba(0, 240, 255, 0.5);
    cursor: pointer;
    outline: none;
    transition: 0.3s;
  }

  #digital-page-header .single-pro-details select:hover {
    border-color: #ff00ff;
    box-shadow: 0 0 10px rgba(0, 240, 255, 0.3);
    color: #ff00ff !important;
  }

  /* Glowing title with gradient text */
  #digital-page-header h2 {
    font-family: 'Press Start 2P', cursive;
    background: linear-gradient(90deg, var(--neon-blue), var(--neon-pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 4px 4px 0px #0f172a, 6px 6px 0px rgba(59, 130, 246, 0.4);
    font-size: 2.8rem;
    filter: drop-shadow(0 0 8px rgba(0, 210, 255, 0.5));
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  /* Individual game card styling */
  .pro {
    background: rgba(255, 255, 255, 0.03) !important;
    border: 1px solid rgba(0, 210, 255, 0.3) !important;
    border-radius: 15px;
    padding: 20px;
    position: relative;
    overflow: hidden;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  /* Hover animation and glow for cards */
  .pro:hover {
    transform: scale(1.05);
    background: rgba(255, 255, 255, 0.07) !important;
    border-color: var(--neon-pink) !important;
    box-shadow: 0 0 40px rgba(255, 0, 255, 0.3);
  }

  .product1 .pro .des h5 {
    padding-top: 7px;
    color: rgba(0, 240, 255, 0.5);
    font-size: 14px;
  }

  /* Neon badge for discounts */
  .discount-badge p span {
    color: var(--neon-blue) !important;
    text-shadow: 0 0 10px rgba(0, 210, 255, 0.8);
    font-family: 'Press Start 2P', cursive;
    font-size: 1.1rem;
  }

  .discount-badge p {
    background: radial-gradient(circle at 20% 30%, rgba(0, 210, 255, 0.15) 0%, transparent 40%),
    radial-gradient(circle at 80% 30%, rgba(255, 0, 255, 0.15) 0%, transparent 40%),
    linear-gradient(180deg, #161b33 0%, var(--deep-bg) 100%);
    color: #e2e8f0 !important;
    font-family: 'Courier New', Courier, monospace;
    font-size: 1rem;
    display: inline-block;
    padding: 12px 20px;
    transform: rotate(-2deg);
    border: 3px solid #000;
    box-shadow: 5px 5px 0px rgba(0,0,0,0.4);
    margin: 10px 0;
  }

  /* Angular clipped sort button */
  #sort-by {
    font-family: 'Press Start 2P', cursive;
    background: transparent;
    color: var(--neon-blue);
    border: 2px solid var(--neon-blue);
    padding: 12px 24px;
    position: relative;
    clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%);
    transition: 0.3s;
  }

  #sort-by:hover {
    background: var(--neon-blue);
    color: var(--deep-bg);
    box-shadow: 0 0 20px var(--neon-blue);
  }

  /* Stock status indicators */
  .stock-container {
    font-family: 'Courier New', Courier, monospace;
    font-size: 0.8rem;
    margin: 8px 0;
    font-weight: bold;
  }

  .stock-label { color: #007c85 !important; }

  .stock-value {
    color: #00e1ff !important;
    text-shadow: 0 0 5px rgba(0, 225, 255, 0.75) !important;
  }
</style>
