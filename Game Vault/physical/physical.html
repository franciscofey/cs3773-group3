<!-- This script calls the load/display function in the game.js file -->
<script type="module">
    import { loadAndDisplayGames } from './physicalGame.js';
    import { cartButtonGameCircle } from '../cart/cartButton.js';

    async function init() {
        // Kick off the initial game load
        await loadAndDisplayGames();

        const searchInput = document.getElementById('search-input');

        if (searchInput) {
            searchInput.addEventListener('input', (e) => {
                const searchTerm = e.target.value.toLowerCase().trim();
                const allCards = document.querySelectorAll('.pro');

                // Toggle visibility based on search match
                allCards.forEach(card => {
                    const name = card.querySelector('h5')?.innerText.toLowerCase() || "";
                    const summary = card.getAttribute('data-summary') || "";

                    if (name.includes(searchTerm) || summary.includes(searchTerm)) {
                        card.style.display = "";
                    } else {
                        card.style.display = "none";
                    }
                });
            });
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        init();

        // Listen for clicks across the whole page
        document.addEventListener('click', (event) => {
            const btn = event.target.closest('.cart');
            const card = event.target.closest('.pro');

            // Run cart logic if the icon is clicked
            if (btn) {
                event.preventDefault();
                event.stopPropagation();
                cartButtonGameCircle(event);
                return;
            }

            // Jump to the product page if the card is clicked
            if (card) {
                const gameId = card.getAttribute('data-id');
                if (gameId) {
                    window.location.href = `./gameProduct.html?id=${gameId}`;
                }
            }
        });

        // Re-run the display logic when sorting changes
        const sortSelect = document.getElementById('sort-by');
        if (sortSelect) {
            sortSelect.addEventListener('change', loadAndDisplayGames);
        }
    });
</script>

<style>
    /* Industrial Retro Arcade - Grey & Yellow Theme */
    body {
        background: radial-gradient(circle at center, #3a3d40 0%, #2b2e31 40%, #1a1c1e 90%);
        background-attachment: fixed;
        background-size: cover;
        margin: 0;
        min-height: 100vh;
        color: #e0e0e0;
        font-family: 'Courier New', Courier, monospace;
    }

    /* Industrial header with heavy gold border */

        url("../img/physical-header.png");
        width: inherit;
        height: 35vh;
        background-size: cover;
        background-position: center;
        display: flex;
        justify-content: center;
        text-align: center;
        flex-direction: column;
        padding: 14px;
        border-bottom: 6px solid #d4a017;
        box-shadow: inset 0 -10px 0 rgba(0,0,0,0.3);
    }

    #physical-page-header .single-pro-details select {
        color: lightgrey !important;
    }

    /* Gold titles for game names */
    .product1 .pro .des h5 {
        padding-top: 7px;
        color: #e0b000;
        font-size: 14px;
    }

    /* Retro pixel font for the main title */
    #physical-page-header h2 {
        font-family: 'Press Start 2P', cursive;
        color: #ffcc00;
        text-shadow: 4px 4px 0px #333, 6px 6px 0px rgba(212, 160, 23, 0.4);
        font-size: 2.5rem;
        margin-bottom: 10px;
        text-transform: uppercase;
    }

    /* Discount banner styled like a price sticker */
    .discount-badge p {
        background: #ffcc00;
        color: #1a1c1e !important;
        font-family: 'Press Start 2P', cursive;
        font-size: 1rem;
        display: inline-block;
        padding: 12px 20px;
        border: 3px solid #000;
        box-shadow: 5px 5px 0px rgba(0,0,0,0.4);
        margin: 10px 0;
    }

    .discount-badge p span {
        color: #000 !important;
        font-weight: bold;
        font-size: 1.3rem;
        text-decoration: underline;
    }

    /* Tilted sticker effect */
    .discount-badge p {
        font-family: 'Press Start 2P', cursive;
        font-size: 1rem;
        color: #000;
        background: #ffcc00;
        display: inline-block;
        padding: 12px 20px;
        transform: rotate(-2deg);
        border: 3px solid #000;
        box-shadow: 5px 5px 0px rgba(0,0,0,0.4);
        margin: 10px 0;
    }

    .discount-badge span {
        color: #666;
        text-decoration: line-through;
    }

    /* Dropdown menu with hard shadows */
    #sort-by {
        font-family: 'Press Start 2P', cursive;
        font-size: 1rem;
        padding: 10px;
        background: #4a4e52;
        color: #666;
        border: 3px solid #d4a017;
        margin-top: 20px;
        cursor: pointer;
        box-shadow: 4px 4px 0px #000;
    }

    #product1, .section-p1 {
        background: transparent !important;
    }

    /* Product cards with a frosted industrial look */
    .pro {
        background: rgba(43, 46, 49, 0.7) !important;
        border: 2px solid #d4a017 !important;
        backdrop-filter: blur(8px);
        border-radius: 8px;
        box-shadow: 10px 10px 0px rgba(0, 0, 0, 0.6);
        transition: 0.3s ease;
        padding: 15px;
    }

    /* Lift and glow effect on hover */
    .pro:hover {
        box-shadow: 0px 0px 25px rgba(255, 204, 0, 0.3);
        border-color: #ffcc00 !important;
        transform: translateY(-5px);
        background: rgba(58, 61, 64, 0.9) !important;
    }

    button:hover {
        background-color: #ffcc00;
    }

    #sort-by:hover {
        background-color: #d4a017;
        box-shadow: 4px 4px 0px rgba(0, 0, 0, 0.8);
    }

    /* Styling for the dropdown items */
    #sort-by option {
        background-color: #1a1c1e;
        color: #ffcc00;
    }

    .stock-container {
        font-family: 'Courier New', Courier, monospace;
        font-size: 0.8rem;
        margin: 8px 0;
        font-weight: bold;
    }

    .stock-label {
        color: #e0b000 !important;
    }

    /* High-contrast stock value with subtle glow */
    .stock-value {
        color: #ffcc00 !important;
        text-shadow: 2px 2px 0px rgba(0, 0, 0, 0.6) !important;
    }
